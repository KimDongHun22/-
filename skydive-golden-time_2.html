<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>황금타임 스카이다이빙</title>
<style>
  :root{
    --sky-deep:#0B1330;
    --sky-mid:#1B2A5E;
    --sky-storm:#2A1E4D;
    --gold:#FFD400;
    --pink:#FF3D7F;
    --cyan:#8CFBFF;
    --cloud:#F1F3FA;
    --ink:#F5F6FA;
    --ink-dim:#B7BEDD;
    --ok:#4ADE80;
    --bad:#FF4D4D;
    --card:#161F45;
    --card-line:rgba(255,255,255,0.08);
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;height:100%;}
  body{
    font-family:"Apple SD Gothic Neo","Malgun Gothic","Noto Sans KR",sans-serif;
    background:radial-gradient(ellipse at 50% -10%, #24356e 0%, var(--sky-deep) 55%);
    color:var(--ink);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:flex-start;
    padding:0;
  }
  #frame{
    width:100%;
    max-width:460px;
    min-height:100vh;
    background:linear-gradient(180deg, #101a42 0%, var(--sky-deep) 100%);
    position:relative;
    overflow:hidden;
    box-shadow:0 0 60px rgba(0,0,0,0.5);
    display:flex;
    flex-direction:column;
  }
  #app{
    position:relative;
    flex:1;
    display:flex;
    flex-direction:column;
    padding:20px 18px 26px;
    z-index:2;
  }

  /* ---------- typography helpers ---------- */
  h1.title{
    font-size:26px;
    font-weight:900;
    letter-spacing:-0.5px;
    margin:4px 0 2px;
    line-height:1.2;
  }
  h1.title .accent{color:var(--gold);}
  p.sub{
    color:var(--ink-dim);
    font-size:13.5px;
    margin:0 0 18px;
    line-height:1.5;
  }
  .eyebrow{
    display:inline-block;
    font-size:11px;
    font-weight:800;
    letter-spacing:1px;
    color:var(--pink);
    background:rgba(255,61,127,0.12);
    border:1px solid rgba(255,61,127,0.4);
    padding:4px 10px;
    border-radius:999px;
    margin-bottom:10px;
    width:fit-content;
  }

  /* ---------- cards / controls ---------- */
  .card{
    background:var(--card);
    border:1px solid var(--card-line);
    border-radius:18px;
    padding:18px;
    margin-bottom:14px;
  }
  .row{display:flex; align-items:center; justify-content:space-between; gap:10px;}
  label.field-label{
    font-size:13px; font-weight:700; color:var(--ink-dim);
    display:block; margin-bottom:8px;
  }
  .stepper{
    display:flex; align-items:center; gap:14px;
    background:rgba(255,255,255,0.05);
    border-radius:14px;
    padding:8px 10px;
  }
  .stepper button{
    width:38px;height:38px;border-radius:10px;border:none;
    background:rgba(255,255,255,0.08); color:var(--ink);
    font-size:20px; font-weight:800; cursor:pointer;
  }
  .stepper button:active{background:var(--pink);}
  .stepper .val{
    flex:1; text-align:center; font-size:22px; font-weight:900; font-variant-numeric:tabular-nums;
  }
  .stepper .val .unit{font-size:13px; color:var(--ink-dim); font-weight:600; margin-left:2px;}

  input[type=text]{
    width:100%; padding:12px 14px; border-radius:12px; border:1px solid var(--card-line);
    background:rgba(255,255,255,0.05); color:var(--ink); font-size:15px; font-weight:700;
    outline:none;
  }
  input[type=text]:focus{border-color:var(--gold);}

  button.primary{
    width:100%; padding:16px; border:none; border-radius:16px;
    background:linear-gradient(135deg, var(--gold), #FFB020);
    color:#20160a; font-size:16px; font-weight:900; letter-spacing:-0.2px;
    cursor:pointer; margin-top:4px;
    box-shadow:0 8px 20px rgba(255,212,0,0.25);
  }
  button.primary:disabled{opacity:0.35; box-shadow:none; cursor:not-allowed;}
  button.primary:active:not(:disabled){transform:translateY(1px);}
  button.secondary{
    width:100%; padding:14px; border-radius:16px;
    background:transparent; border:1.5px solid var(--card-line);
    color:var(--ink); font-size:14px; font-weight:800; cursor:pointer; margin-top:8px;
  }
  button.danger-mode{
    background:linear-gradient(135deg, var(--pink), #C4206A);
    box-shadow:0 8px 20px rgba(255,61,127,0.3);
    color:#fff;
  }

  .char-grid{
    display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-top:6px;
  }
  .char-btn{
    background:rgba(255,255,255,0.05); border:2px solid transparent; border-radius:14px;
    padding:12px 6px; text-align:center; cursor:pointer;
  }
  .char-btn .emo{font-size:28px; display:block; margin-bottom:6px;}
  .char-btn .nm{font-size:10.5px; color:var(--ink-dim); font-weight:700; line-height:1.3;}
  .char-btn.selected{border-color:var(--gold); background:rgba(255,212,0,0.12);}
  .char-btn.taken{opacity:0.25; pointer-events:none;}

  /* progress dots for character select */
  .dots{display:flex; gap:6px; margin-bottom:14px;}
  .dot{width:7px;height:7px;border-radius:50%; background:rgba(255,255,255,0.15);}
  .dot.done{background:var(--ok);}
  .dot.now{background:var(--gold);}

  /* ---------- order reveal ---------- */
  .order-list{list-style:none; margin:0; padding:0;}
  .order-item{
    display:flex; align-items:center; gap:12px;
    background:var(--card); border:1px solid var(--card-line); border-radius:14px;
    padding:12px 14px; margin-bottom:8px;
    opacity:0; transform:translateY(8px);
    animation:popIn 0.4s ease forwards;
  }
  @keyframes popIn{ to{opacity:1; transform:translateY(0);} }
  .order-num{
    width:30px;height:30px;border-radius:50%;
    background:linear-gradient(135deg, var(--gold), #FFB020);
    color:#20160a; font-weight:900; font-size:13px;
    display:flex; align-items:center; justify-content:center; flex-shrink:0;
  }
  .order-emo{font-size:22px;}
  .order-name{font-weight:800; font-size:14.5px;}

  /* ---------- play scene ---------- */
  .scene{
    position:relative;
    height:300px;
    border-radius:20px;
    overflow:hidden;
    background:linear-gradient(180deg, #4A6FD1 0%, #2C4694 30%, #1B2A5E 65%, var(--sky-storm) 100%);
    margin-bottom:16px;
    border:1px solid var(--card-line);
  }
  .cloud{
    position:absolute; font-size:34px; opacity:0.85; filter:drop-shadow(0 4px 6px rgba(0,0,0,0.2));
    animation:drift linear infinite;
  }
  @keyframes drift{
    from{transform:translateX(-40px);}
    to{transform:translateX(360px);}
  }
  .storm-layer{
    position:absolute; left:0; right:0; bottom:0; height:45%;
    background:linear-gradient(180deg, rgba(42,30,77,0) 0%, rgba(20,10,40,0.85) 100%);
  }
  .flash{
    position:absolute; inset:0; background:#fff; opacity:0; pointer-events:none;
  }
  .flash.on{opacity:0.55; transition:opacity 0.05s;}
  .flash.off{opacity:0; transition:opacity 0.25s;}
  .plane{
    position:absolute; top:34px; left:8px; font-size:56px;
    transform:scaleX(-1);
    filter:drop-shadow(0 6px 10px rgba(0,0,0,0.35));
    animation:planeIdle 2.1s ease-in-out infinite;
    z-index:6;
  }
  @keyframes planeIdle{
    0%,100%{transform:scaleX(-1) translateY(0) rotate(0deg);}
    50%{transform:scaleX(-1) translateY(-7px) rotate(-3deg);}
  }
  .plane.flying{animation:planeFly 0.9s cubic-bezier(.4,0,.7,1) forwards;}
  @keyframes planeFly{
    0%{transform:scaleX(-1) translate(0,0) rotate(0deg);}
    100%{transform:scaleX(-1) translate(380px,-26px) rotate(-8deg); opacity:0;}
  }
  .faller{
    position:absolute; left:50%; top:44px; font-size:46px;
    transform:translate(-50%,0) rotate(0deg) scale(0.3);
    filter:drop-shadow(0 6px 8px rgba(0,0,0,0.35));
    opacity:0;
    z-index:5;
  }
  .faller.jumped{animation:jumpOut 0.4s cubic-bezier(.2,.8,.3,1.3) forwards;}
  @keyframes jumpOut{
    0%{opacity:0; transform:translate(-50%,0) scale(0.3) rotate(0deg);}
    55%{opacity:1; transform:translate(-70%,-10px) scale(1.2) rotate(-15deg);}
    100%{opacity:1; transform:translate(-50%,0) scale(1) rotate(0deg);}
  }
  .faller.touchdown{animation:touchdownBounce 0.5s ease-out;}
  @keyframes touchdownBounce{
    0%{transform:translate(-50%,0) scale(1,1);}
    30%{transform:translate(-50%,0) scale(1.25,0.75);}
    55%{transform:translate(-50%,-10px) scale(0.9,1.1);}
    100%{transform:translate(-50%,0) scale(1,1);}
  }
  .chute{
    position:absolute; left:50%; font-size:38px; transform:translate(-50%,0) scale(0);
    top:0; z-index:4;
  }
  .chute.open{animation:chuteOpen 0.4s ease forwards;}
  @keyframes chuteOpen{ to{transform:translate(-50%,0) scale(1);} }
  .impact{
    position:absolute; left:50%; bottom:6px; font-size:44px; transform:translate(-50%,0) scale(0);
    z-index:6;
  }
  .impact.show{animation:impactPop 0.35s ease forwards;}
  @keyframes impactPop{
    0%{transform:translate(-50%,0) scale(0);}
    60%{transform:translate(-50%,0) scale(1.3);}
    100%{transform:translate(-50%,0) scale(1);}
  }

  .particle{
    position:absolute; font-size:18px; opacity:0; pointer-events:none; z-index:9;
  }
  .particle.go{animation:particleFly 1s ease-out forwards;}
  @keyframes particleFly{
    0%{opacity:1; transform:translate(0,0) scale(0.6) rotate(0deg);}
    100%{opacity:0; transform:var(--pend) scale(1.15) rotate(180deg);}
  }

  .face-overlay{
    position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
    z-index:12; opacity:0; pointer-events:none;
  }
  .face-overlay.show{animation:faceIn 0.55s cubic-bezier(.2,.9,.3,1.3) forwards;}
  @keyframes faceIn{
    0%{opacity:0; transform:scale(0.2) rotate(-10deg);}
    65%{opacity:1; transform:scale(1.18) rotate(4deg);}
    100%{opacity:1; transform:scale(1) rotate(0deg);}
  }
  .face-glow{
    position:absolute; width:230px; height:230px; border-radius:50%;
    top:50%; left:50%; transform:translate(-50%,-50%);
  }
  .face-glow.ok{background:radial-gradient(circle, rgba(255,212,0,0.35), transparent 70%);}
  .face-glow.bad{background:radial-gradient(circle, rgba(255,77,77,0.3), transparent 70%);}
  .face-stack{position:relative; z-index:1;}
  .face-main{font-size:108px; display:block; filter:drop-shadow(0 10px 16px rgba(0,0,0,0.45));}
  .face-badge{
    position:absolute; top:-8px; right:-14px; font-size:44px;
    filter:drop-shadow(0 4px 8px rgba(0,0,0,0.4));
    animation:badgeBounce 0.6s ease-in-out infinite;
  }
  @keyframes badgeBounce{
    0%,100%{transform:translateY(0) rotate(-6deg);}
    50%{transform:translateY(-6px) rotate(6deg);}
  }

  .scene-caption{
    position:absolute; top:10px; left:0; right:0; text-align:center;
    font-size:11.5px; font-weight:800; letter-spacing:0.5px; color:rgba(255,255,255,0.75);
    z-index:7;
  }

  .shake{animation:shakeAnim 0.35s;}
  @keyframes shakeAnim{
    0%,100%{transform:translateX(0);}
    20%{transform:translateX(-6px);}
    40%{transform:translateX(6px);}
    60%{transform:translateX(-4px);}
    80%{transform:translateX(4px);}
  }

  .player-tag{
    display:flex; align-items:center; gap:10px; margin-bottom:12px;
  }
  .player-tag .pe{font-size:26px;}
  .player-tag .pn{font-weight:900; font-size:16px;}
  .player-tag .pmeta{font-size:12px; color:var(--ink-dim); font-weight:700;}

  .timer-wrap{
    text-align:center;
    background:radial-gradient(ellipse at 50% 0%, rgba(255,212,0,0.1), transparent 70%);
    border:1px solid var(--card-line);
    border-radius:20px;
    padding:16px 10px 12px;
    margin-bottom:14px;
  }
  .timer-label{
    font-size:11px; font-weight:800; letter-spacing:1.5px; color:var(--ink-dim);
    margin-bottom:2px;
  }
  .timer-display{
    font-size:64px; font-weight:900; font-variant-numeric:tabular-nums;
    letter-spacing:-2px; line-height:1;
    color:var(--ink);
    text-shadow:0 0 18px rgba(255,255,255,0.15);
  }
  .timer-display .cs{font-size:36px; opacity:0.85;}
  .timer-display.ticking{
    color:var(--gold);
    text-shadow:0 0 24px rgba(255,212,0,0.55);
    animation:heartbeat 0.5s ease-in-out infinite;
  }
  .timer-display.frozen-ok{color:var(--ok); text-shadow:0 0 24px rgba(74,222,128,0.5);}
  .timer-display.frozen-bad{color:var(--bad); text-shadow:0 0 24px rgba(255,77,77,0.5);}
  .timer-display.frozen-perfect{color:var(--gold); text-shadow:0 0 30px rgba(255,212,0,0.85);}
  @keyframes heartbeat{
    0%,100%{transform:scale(1);}
    50%{transform:scale(1.05);}
  }

  .result-panel{
    text-align:center; padding:16px 10px 4px;
  }
  .result-time{
    font-size:34px; font-weight:900; font-variant-numeric:tabular-nums; letter-spacing:-1px;
  }
  .result-time .u{font-size:16px; color:var(--ink-dim); font-weight:700;}
  .result-status{
    font-size:14px; font-weight:800; margin-top:6px;
  }
  .result-status.ok{color:var(--ok);}
  .result-status.bad{color:var(--bad);}
  .result-status.perfect{color:var(--gold);}

  /* ---------- results ---------- */
  .rank-item{
    display:flex; align-items:center; gap:12px;
    background:var(--card); border:1px solid var(--card-line); border-radius:16px;
    padding:12px 14px; margin-bottom:9px;
    position:relative;
  }
  .rank-item.top1{
    border-color:var(--gold);
    box-shadow:0 0 0 1px var(--gold), 0 8px 20px rgba(255,212,0,0.15);
  }
  .rank-item.perfect{
    border-color:var(--gold);
    background:linear-gradient(135deg, rgba(255,212,0,0.15), rgba(255,212,0,0.03));
  }
  .rank-badge{
    width:34px;height:34px;border-radius:50%; flex-shrink:0;
    display:flex; align-items:center; justify-content:center;
    font-weight:900; font-size:13px;
    background:rgba(255,255,255,0.07);
  }
  .rank-item.top1 .rank-badge{background:linear-gradient(135deg,var(--gold),#FFB020); color:#20160a;}
  .rank-emo{font-size:24px; flex-shrink:0;}
  .rank-info{flex:1; min-width:0;}
  .rank-name{font-weight:800; font-size:14px;}
  .rank-sub{font-size:11.5px; color:var(--ink-dim); font-weight:600; margin-top:2px;}
  .rank-diff{font-size:14px; font-weight:900; font-variant-numeric:tabular-nums; text-align:right; flex-shrink:0;}
  .rank-diff .lbl{display:block; font-size:9.5px; color:var(--ink-dim); font-weight:700;}

  .golden-banner{
    background:linear-gradient(135deg, rgba(255,212,0,0.18), rgba(255,61,127,0.1));
    border:1.5px solid var(--gold);
    border-radius:16px; padding:14px; margin-bottom:14px; text-align:center;
  }
  .golden-banner .gt{font-size:15px; font-weight:900; color:var(--gold);}
  .golden-banner .gs{font-size:12px; color:var(--ink-dim); margin-top:4px; font-weight:600;}

  .hint-box{
    background:rgba(255,255,255,0.04); border:1px dashed var(--card-line);
    border-radius:14px; padding:12px 14px; font-size:12px; color:var(--ink-dim);
    line-height:1.6; margin-bottom:14px;
  }
  .hint-box b{color:var(--ink);}
</style>
</head>
<body>
<div id="frame">
  <div id="app"></div>
</div>

<script>
(function(){
  "use strict";

  const CHARACTERS = [
    {emoji:'🐔', name:'치킨런 프랭크'},
    {emoji:'🥴', name:'만취 삼촌'},
    {emoji:'🦆', name:'오리대장 덕구'},
    {emoji:'🐢', name:'느긋한 거북이'},
    {emoji:'🍺', name:'맥주요정 홉스'},
    {emoji:'🤡', name:'삐에로 삼식이'},
    {emoji:'👽', name:'외계인 짜장'},
    {emoji:'🦸', name:'동네히어로 반장'},
    {emoji:'🐙', name:'문어발 사장님'},
    {emoji:'🦖', name:'쥐라기 부장님'},
  ];

  const PERFECT_TOL = 0.05; // 골든타임 판정 오차
  const SAFE_TOL = 1.00;    // 낙하산이 펼쳐지는 오차 범위

  let state = {
    phase: 'setup',
    targetTime: 10.00,
    playerCount: 4,
    players: [],
    order: [],
    currentPos: 0, // index into state.order
    tmpCharPickIdx: 0,
  };

  let runtime = {
    running:false,
    startTs:0,
    rafId:null,
    flashTimer:null,
  };

  const app = document.getElementById('app');

  function fmt2(n){ return n.toFixed(2); }

  function resetPlayersFromCount(){
    const n = state.playerCount;
    const arr = [];
    for(let i=0;i<n;i++){
      arr.push({id:i, name:'선수 '+(i+1), charIdx:null, result:null});
    }
    state.players = arr;
  }

  /* ============ SETUP ============ */
  function renderSetup(){
    app.innerHTML = `
      <span class="eyebrow">병맛 파티게임</span>
      <h1 class="title">황금타임<br><span class="accent">스카이다이빙</span></h1>
      <p class="sub">비행기에서 뛰어내려 번개구름을 지나, 목표 시간에 가장 가깝게 낙하산을 펼쳐라! 숫자는 보이지 않는다 — 오직 감(感)뿐.</p>

      <div class="card">
        <label class="field-label">🎯 목표 시간 (골든타임)</label>
        <div class="stepper">
          <button id="tMinus">−</button>
          <div class="val" id="targetVal">${fmt2(state.targetTime)}<span class="unit">초</span></div>
          <button id="tPlus">+</button>
        </div>
      </div>

      <div class="card">
        <label class="field-label">👥 참가 인원수</label>
        <div class="stepper">
          <button id="pMinus">−</button>
          <div class="val" id="playerVal">${state.playerCount}<span class="unit">명</span></div>
          <button id="pPlus">+</button>
        </div>
      </div>

      <div class="hint-box">
        <b>진행 방식</b> · 목표시간 설정 → 캐릭터 선택 → 참여 순서 랜덤 배정 → 한 명씩 낙하 타이밍 도전 → 오차 순위 공개.<br>
        목표시간 <b>±${SAFE_TOL.toFixed(1)}초</b> 안이면 낙하산 성공, 벗어나면 추락! <b>±${PERFECT_TOL.toFixed(2)}초</b> 이내면 골든타임 특별 리워드 🏆
      </div>

      <button class="primary" id="goNext">캐릭터 선택하러 가기 →</button>
    `;

    document.getElementById('tMinus').onclick = ()=>{
      state.targetTime = Math.max(1, +(state.targetTime - 0.5).toFixed(2));
      document.getElementById('targetVal').innerHTML = fmt2(state.targetTime)+'<span class="unit">초</span>';
    };
    document.getElementById('tPlus').onclick = ()=>{
      state.targetTime = Math.min(60, +(state.targetTime + 0.5).toFixed(2));
      document.getElementById('targetVal').innerHTML = fmt2(state.targetTime)+'<span class="unit">초</span>';
    };
    document.getElementById('pMinus').onclick = ()=>{
      state.playerCount = Math.max(2, state.playerCount - 1);
      document.getElementById('playerVal').innerHTML = state.playerCount+'<span class="unit">명</span>';
    };
    document.getElementById('pPlus').onclick = ()=>{
      state.playerCount = Math.min(10, state.playerCount + 1);
      document.getElementById('playerVal').innerHTML = state.playerCount+'<span class="unit">명</span>';
    };
    document.getElementById('goNext').onclick = ()=>{
      resetPlayersFromCount();
      state.tmpCharPickIdx = 0;
      state.phase = 'character';
      render();
    };
  }

  /* ============ CHARACTER SELECT ============ */
  function renderCharacter(){
    const idx = state.tmpCharPickIdx;
    const player = state.players[idx];
    const takenIdxs = state.players.filter(p=>p.charIdx!==null).map(p=>p.charIdx);

    let dots = '';
    for(let i=0;i<state.players.length;i++){
      let cls = 'dot';
      if(i<idx) cls += ' done';
      else if(i===idx) cls += ' now';
      dots += `<div class="${cls}"></div>`;
    }

    let grid = '';
    CHARACTERS.forEach((c,i)=>{
      const taken = takenIdxs.includes(i);
      const selected = player.charIdx === i;
      grid += `<div class="char-btn ${selected?'selected':''} ${taken?'taken':''}" data-idx="${i}">
        <span class="emo">${c.emoji}</span><span class="nm">${c.name}</span>
      </div>`;
    });

    app.innerHTML = `
      <span class="eyebrow">캐릭터 선택 · ${idx+1}/${state.players.length}</span>
      <h1 class="title">누가 뛰어내리나요?</h1>
      <p class="sub">닉네임을 입력하고 마음에 드는 캐릭터를 골라주세요.</p>
      <div class="dots">${dots}</div>

      <div class="card">
        <label class="field-label">닉네임</label>
        <input type="text" id="nameInput" maxlength="10" value="${player.name}">
      </div>

      <div class="card">
        <label class="field-label">캐릭터</label>
        <div class="char-grid">${grid}</div>
      </div>

      <button class="primary" id="charNext" ${player.charIdx===null?'disabled':''}>
        ${idx === state.players.length-1 ? '순서 뽑으러 가기 →' : '다음 선수 →'}
      </button>
      ${idx>0 ? '<button class="secondary" id="charBack">← 이전 선수</button>' : ''}
    `;

    document.getElementById('nameInput').oninput = (e)=>{
      player.name = e.target.value.trim() || ('선수 '+(idx+1));
    };
    document.querySelectorAll('.char-btn').forEach(btn=>{
      btn.onclick = ()=>{
        if(btn.classList.contains('taken')) return;
        player.charIdx = +btn.dataset.idx;
        renderCharacter();
      };
    });
    document.getElementById('charNext').onclick = ()=>{
      if(player.charIdx===null) return;
      if(idx === state.players.length-1){
        buildOrderAndReveal();
      } else {
        state.tmpCharPickIdx++;
        renderCharacter();
      }
    };
    const backBtn = document.getElementById('charBack');
    if(backBtn) backBtn.onclick = ()=>{ state.tmpCharPickIdx--; renderCharacter(); };
  }

  function shuffle(arr){
    const a = arr.slice();
    for(let i=a.length-1;i>0;i--){
      const j = Math.floor(Math.random()*(i+1));
      [a[i],a[j]] = [a[j],a[i]];
    }
    return a;
  }

  function buildOrderAndReveal(){
    state.order = shuffle(state.players.map(p=>p.id));
    state.currentPos = 0;
    state.phase = 'order';
    render();
  }

  /* ============ ORDER REVEAL ============ */
  function renderOrder(){
    app.innerHTML = `
      <span class="eyebrow">참여 순서 추첨</span>
      <h1 class="title">랜덤 낙하 순서!</h1>
      <p class="sub">두구두구두구... 순서가 공개됩니다.</p>
      <ul class="order-list" id="orderList"></ul>
      <button class="primary" id="startGame" style="display:none;">🛫 게임 시작!</button>
    `;
    const list = document.getElementById('orderList');
    state.order.forEach((pid, i)=>{
      const p = state.players.find(pp=>pp.id===pid);
      const c = CHARACTERS[p.charIdx];
      setTimeout(()=>{
        const li = document.createElement('li');
        li.className = 'order-item';
        li.style.animationDelay = '0s';
        li.innerHTML = `<div class="order-num">${i+1}</div><div class="order-emo">${c.emoji}</div><div class="order-name">${p.name}</div>`;
        list.appendChild(li);
        if(i === state.order.length-1){
          document.getElementById('startGame').style.display = 'block';
        }
      }, i*350);
    });
    document.getElementById('startGame').onclick = ()=>{
      state.currentPos = 0;
      state.phase = 'play';
      render();
    };
  }

  /* ============ PLAY ============ */
  function currentPlayer(){
    const pid = state.order[state.currentPos];
    return state.players.find(p=>p.id===pid);
  }

  function renderPlay(){
    const player = currentPlayer();
    const c = CHARACTERS[player.charIdx];
    runtime.running = false;

    app.innerHTML = `
      <span class="eyebrow">낙하 도전 · ${state.currentPos+1}/${state.order.length}</span>
      <div class="player-tag">
        <span class="pe">${c.emoji}</span>
        <div>
          <div class="pn">${player.name}</div>
          <div class="pmeta">목표 ${fmt2(state.targetTime)}초 근처에서 낙하산 펼치기</div>
        </div>
      </div>

      <div class="timer-wrap">
        <div class="timer-label">경과 시간</div>
        <div class="timer-display" id="timerDisplay">0<span class="cs">.00</span></div>
      </div>

      <div class="scene" id="scene">
        <div class="scene-caption" id="sceneCaption">이륙 준비 중...</div>
        <div class="cloud" style="top:40px; left:10%; animation-duration:9s;">☁️</div>
        <div class="cloud" style="top:90px; left:-10%; animation-duration:13s; animation-delay:-4s;">☁️</div>
        <div class="cloud" style="top:150px; left:20%; animation-duration:11s; animation-delay:-2s;">☁️</div>
        <div class="storm-layer"></div>
        <div class="plane" id="plane">✈️</div>
        <div class="chute" id="chute">🪂</div>
        <div class="faller" id="faller">${c.emoji}</div>
        <div class="impact" id="impact">💥</div>
        <div class="face-overlay" id="faceOverlay">
          <div class="face-glow" id="faceGlow"></div>
          <div class="face-stack">
            <span class="face-main">${c.emoji}</span>
            <span class="face-badge" id="faceBadge"></span>
          </div>
        </div>
        <div class="flash" id="flash"></div>
      </div>

      <div id="resultArea"></div>

      <button class="primary" id="actionBtn">🛫 낙하 시작!</button>
      <div class="hint-box">타이머가 실시간으로 올라가요. 목표 <b>${fmt2(state.targetTime)}초</b>에 최대한 가깝게 <b>낙하산 펼치기</b>를 눌러보세요. 0.01초 단위까지 정확해야 해요!</div>
    `;

    const actionBtn = document.getElementById('actionBtn');
    actionBtn.onclick = ()=>{
      if(!runtime.running){
        startFall();
      } else {
        stopFall();
      }
    };
  }

  function startFall(){
    runtime.running = true;
    runtime.startTs = performance.now();
    const btn = document.getElementById('actionBtn');
    btn.textContent = '🪂 낙하산 펼치기!';
    btn.classList.add('danger-mode');
    document.getElementById('sceneCaption').textContent = '점프!!';

    const plane = document.getElementById('plane');
    plane.classList.add('flying');

    const faller = document.getElementById('faller');
    faller.classList.add('jumped');

    const timerDisplay = document.getElementById('timerDisplay');
    if(timerDisplay) timerDisplay.classList.add('ticking');

    // random lightning flashes starting a bit into the fall
    let flashCount = 0;
    runtime.flashTimer = setInterval(()=>{
      const flash = document.getElementById('flash');
      if(!flash) return;
      flash.className = 'flash on';
      setTimeout(()=>{ if(document.getElementById('flash')) document.getElementById('flash').className='flash off'; }, 90);
      flashCount++;
    }, 700 + Math.random()*500);

    function frame(){
      if(!runtime.running) return;
      const elapsed = (performance.now() - runtime.startTs)/1000;
      const timerDisplay = document.getElementById('timerDisplay');
      if(timerDisplay){
        const whole = Math.floor(elapsed);
        const cs = Math.floor((elapsed-whole)*100).toString().padStart(2,'0');
        timerDisplay.innerHTML = `${whole}<span class="cs">.${cs}</span>`;
      }
      const faller = document.getElementById('faller');
      if(faller && elapsed > 0.42){
        // jump-out animation has finished by now; take over the fall from here
        const t = Math.min(elapsed/14, 1);
        const y = 44 + t*186;
        const wobble = Math.sin(elapsed*3.2)*14;
        faller.style.top = y+'px';
        faller.style.transform = `translate(calc(-50% + ${wobble}px), 0) rotate(${wobble*1.2}deg) scale(1)`;
      }
      const cap = document.getElementById('sceneCaption');
      if(cap){
        if(elapsed < 0.5) cap.textContent = '점프!!';
        else if(elapsed < 3.5) cap.textContent = '구름층 진입...';
        else if(elapsed < 7.5) cap.textContent = '⚡ 번개구름 통과 중 ⚡';
        else cap.textContent = '지상이 가까워진다...';
      }
      runtime.rafId = requestAnimationFrame(frame);
    }
    runtime.rafId = requestAnimationFrame(frame);
  }

  function stopFall(){
    if(!runtime.running) return;
    const elapsed = (performance.now() - runtime.startTs)/1000;
    runtime.running = false;
    cancelAnimationFrame(runtime.rafId);
    clearInterval(runtime.flashTimer);

    const diff = Math.abs(elapsed - state.targetTime);
    let status;
    if(diff <= PERFECT_TOL) status = 'perfect';
    else if(diff <= SAFE_TOL) status = 'ok';
    else status = 'bad';

    const player = currentPlayer();
    player.result = {elapsed, diff, status};

    const btn = document.getElementById('actionBtn');
    const faller = document.getElementById('faller');
    const chute = document.getElementById('chute');
    const scene = document.getElementById('scene');
    const cap = document.getElementById('sceneCaption');
    const timerDisplay = document.getElementById('timerDisplay');
    if(timerDisplay){
      timerDisplay.classList.remove('ticking');
      timerDisplay.innerHTML = `${Math.floor(elapsed)}<span class="cs">.${Math.floor((elapsed-Math.floor(elapsed))*100).toString().padStart(2,'0')}</span>`;
      timerDisplay.classList.add(status==='perfect' ? 'frozen-perfect' : status==='ok' ? 'frozen-ok' : 'frozen-bad');
    }

    const LAND_FALL_MS = 1000;   // 낙하산이 펼쳐진 뒤 착지까지 걸리는 시간
    const LAND_HOLD_MS = 700;    // 착지 후, 결과가 드러나기 전까지 대기 시간
    const CRASH_FALL_MS = 550;   // 추락 낙하 시간
    const CRASH_HOLD_MS = 850;   // 추락(폭발) 후, 얼굴이 나오기 전까지 대기 시간

    if(status !== 'bad'){
      // 1) 낙하산이 펼쳐진다
      const topPx = faller.style.top || '150px';
      const landTop = 208;
      chute.style.top = (parseFloat(topPx) - 34) + 'px';
      chute.classList.add('open');
      cap.textContent = status==='perfect' ? '🏆 골든타임 낙하산 오픈!' : '🪂 낙하산 오픈!';

      // 2) 천천히 하강해서 착지한다
      faller.style.transition = `top ${LAND_FALL_MS}ms cubic-bezier(.22,.6,.3,1)`;
      chute.style.transition = `top ${LAND_FALL_MS}ms cubic-bezier(.22,.6,.3,1)`;
      requestAnimationFrame(()=>{
        faller.style.top = landTop + 'px';
        chute.style.top = (landTop - 34) + 'px';
      });

      setTimeout(()=>{
        faller.classList.add('touchdown');
        cap.textContent = status==='perfect' ? '🎯 완벽한 골든타임 착지 성공!' : '✅ 안전하게 착지했습니다!';
      }, LAND_FALL_MS);

      // 3) 착지 장면을 충분히 보여준 뒤 폭죽 + 얼굴 공개
      setTimeout(()=>{
        spawnParticles(scene, ['🎉','🎊','✨','⭐','🌟'], status==='perfect' ? 22 : 16);
        const badges = status==='perfect' ? ['🤩','🥳'] : ['😄','😆','😁'];
        showFace('ok', badges[Math.floor(Math.random()*badges.length)]);
        revealResult();
      }, LAND_FALL_MS + LAND_HOLD_MS);

    } else {
      // 1) 낙하산이 펼쳐지지 않는다
      cap.textContent = '낙하산이... 펼쳐지지 않는다!!';

      // 2) 그대로 추락한다
      faller.style.transition = `top ${CRASH_FALL_MS}ms cubic-bezier(.55,0,.85,1)`;
      requestAnimationFrame(()=>{ faller.style.top = '246px'; });

      setTimeout(()=>{
        faller.style.transition = 'opacity 0.15s ease';
        faller.style.opacity = '0';
        document.getElementById('impact').classList.add('show');
        scene.classList.add('shake');
        cap.textContent = '💥 추락했습니다...';
      }, CRASH_FALL_MS);

      // 3) 추락 장면을 충분히 보여준 뒤 폭발 파편 + 얼굴 공개
      setTimeout(()=>{
        spawnParticles(scene, ['💢','🔥','💨','⚡'], 14);
        const badges = ['😡','😭','🤬','😱'];
        showFace('bad', badges[Math.floor(Math.random()*badges.length)]);
        revealResult();
      }, CRASH_FALL_MS + CRASH_HOLD_MS);
    }

    btn.style.display = 'none';

    function revealResult(){
      const resultArea = document.getElementById('resultArea');
      if(!resultArea) return;
      const statusText = status==='perfect' ? '🏆 골든타임! 특별 리워드 획득!' :
                          status==='ok' ? '🪂 낙하산 성공 (안전 착지)' :
                          '💥 낙하산 실패 (추락)';
      resultArea.innerHTML = `
        <div class="card result-panel">
          <div class="result-time">${fmt2(elapsed)}<span class="u">초</span></div>
          <div class="result-status ${status}">${statusText}</div>
          <div style="font-size:12px; color:var(--ink-dim); margin-top:4px;">목표와의 오차: ${fmt2(diff)}초</div>
        </div>
        <button class="primary" id="nextBtn">${state.currentPos === state.order.length-1 ? '🏁 최종 결과 보기' : '다음 선수 →'}</button>
      `;
      document.getElementById('nextBtn').onclick = ()=>{
        if(state.currentPos === state.order.length-1){
          state.phase = 'results';
        } else {
          state.currentPos++;
          state.phase = 'play';
        }
        render();
      };
    }
  }

  function showFace(kind, badgeEmoji){
    const overlay = document.getElementById('faceOverlay');
    const glow = document.getElementById('faceGlow');
    const badge = document.getElementById('faceBadge');
    if(!overlay) return;
    glow.className = 'face-glow ' + kind;
    badge.textContent = badgeEmoji;
    overlay.classList.add('show');
  }

  function spawnParticles(scene, emojis, count){
    for(let i=0;i<count;i++){
      const p = document.createElement('div');
      p.className = 'particle';
      p.textContent = emojis[Math.floor(Math.random()*emojis.length)];
      const cx = 50 + (Math.random()*20-10);
      p.style.left = cx+'%';
      p.style.top = '45%';
      const angle = Math.random()*Math.PI*2;
      const dist = 60+Math.random()*60;
      p.style.setProperty('--pend', `translate(${Math.cos(angle)*dist}px, ${Math.sin(angle)*dist}px)`);
      scene.appendChild(p);
      requestAnimationFrame(()=>p.classList.add('go'));
      setTimeout(()=>p.remove(), 950);
    }
  }

  /* ============ RESULTS ============ */
  function renderResults(){
    const ranked = state.players.slice().sort((a,b)=>a.result.diff - b.result.diff);
    const winner = ranked[0];
    const goldenHitters = ranked.filter(p=>p.result.status==='perfect');

    let bannerHtml = '';
    if(goldenHitters.length>0){
      const names = goldenHitters.map(p=>p.name).join(', ');
      bannerHtml = `
        <div class="golden-banner">
          <div class="gt">🏆 골든타임 정확 적중!</div>
          <div class="gs">${names} 님, 특별 리워드를 가져가세요 🎁</div>
        </div>`;
    }

    let listHtml = '';
    ranked.forEach((p,i)=>{
      const c = CHARACTERS[p.charIdx];
      const medal = i===0?'🥇':i===1?'🥈':i===2?'🥉':(i+1);
      const isTop1 = i===0;
      const isPerfect = p.result.status==='perfect';
      const statusLabel = p.result.status==='perfect' ? '골든타임' : p.result.status==='ok' ? '낙하산 성공' : '추락';
      listHtml += `
        <div class="rank-item ${isTop1?'top1':''} ${isPerfect?'perfect':''}">
          <div class="rank-badge">${medal}</div>
          <div class="rank-emo">${c.emoji}</div>
          <div class="rank-info">
            <div class="rank-name">${p.name}</div>
            <div class="rank-sub">${fmt2(p.result.elapsed)}초 · ${statusLabel}</div>
          </div>
          <div class="rank-diff">${fmt2(p.result.diff)}<span class="lbl">오차(초)</span></div>
        </div>`;
    });

    app.innerHTML = `
      <span class="eyebrow">최종 결과</span>
      <h1 class="title">착지 순위 공개!</h1>
      <p class="sub">목표 ${fmt2(state.targetTime)}초에 가장 가깝게 낙하산을 편 사람이 승자입니다.</p>
      ${bannerHtml}
      ${listHtml}
      <button class="primary" id="replayBtn">🔁 같은 설정으로 다시하기</button>
      <button class="secondary" id="newBtn">⚙️ 처음부터 새로 설정하기</button>
    `;

    document.getElementById('replayBtn').onclick = ()=>{
      state.players.forEach(p=>p.result=null);
      buildOrderAndReveal();
    };
    document.getElementById('newBtn').onclick = ()=>{
      state = {phase:'setup', targetTime:10.00, playerCount:4, players:[], order:[], currentPos:0, tmpCharPickIdx:0};
      render();
    };
  }

  /* ============ ROUTER ============ */
  function render(){
    if(runtime.rafId) cancelAnimationFrame(runtime.rafId);
    if(runtime.flashTimer) clearInterval(runtime.flashTimer);
    runtime.running = false;

    switch(state.phase){
      case 'setup': renderSetup(); break;
      case 'character': renderCharacter(); break;
      case 'order': renderOrder(); break;
      case 'play': renderPlay(); break;
      case 'results': renderResults(); break;
      default: renderSetup();
    }
  }

  render();
})();
</script>
</body>
</html>
